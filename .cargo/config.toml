# Apple's `ld` is the single-threaded bottleneck in debug link times (CPU sits idle while it
# runs); lld links Mach-O 20-50% faster. Absolute `--ld-path` is PATH-independent, so it works
# the same whether cargo is launched from the terminal, Zed, or rust-analyzer. Install: `brew install lld`.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=--ld-path=/opt/homebrew/opt/lld/bin/ld64.lld"]

# One deployment target for every object in the link. rustc's default is 11.0 while ort-sys's
# prebuilt onnxruntime libs are stamped 13.4 and `cc`-built C (tracy, blake3) would default to
# the host macOS — the mismatch makes ld64.lld warn per object file. 13.4 is the app's honest
# floor anyway (ort's prebuilt requires it); rustc and the `cc` crate both read this env var.
[env]
MACOSX_DEPLOYMENT_TARGET = "13.4"

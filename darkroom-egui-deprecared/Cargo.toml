[package]
name = "darkroom-egui"
version.workspace = true
edition.workspace = true

[dependencies]
common = { workspace = true }
scenarium = { workspace = true }
imaginarium = { workspace = true }
lens = { workspace = true }


# wgpu version should be in sync with egui
wgpu = { version = "29.0", features = ["metal", "vulkan", "dx12"] }
eframe = { version = "0.34", default-features = false, features = ["default_fonts", "persistence", "wgpu", "wayland"] }
egui = { version = "0.34", default-features = false, features = ["default_fonts", "rayon", "serde"] }

anyhow = { workspace = true }

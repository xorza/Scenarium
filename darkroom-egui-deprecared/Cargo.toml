dotenv = { workspace = true }
tracing-rolling-file = { workspace = true }
tracing-appender = { workspace = true }
hashbrown = { workspace = true }
lz4_flex = { workspace = true }
rfd = { workspace = true }
ratatui = { workspace = true }

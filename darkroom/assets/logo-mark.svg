<svg xmlns="http://www.w3.org/2000/svg" viewBox="26 96 468 320" width="468" height="320" role="img" aria-label="darkroom">
  <defs>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4c4c4c"/>
      <stop offset="1" stop-color="#363636"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7d66"/>
      <stop offset="1" stop-color="#ed4f35"/>
    </linearGradient>
    <clipPath id="nodeclip">
      <rect x="124" y="106" width="264" height="300" rx="42"/>
    </clipPath>
  </defs>

  <!-- connection halos -->
  <g fill="none" stroke-linecap="round" stroke-width="54" opacity="0.16">
    <path d="M58,186 C92,186 96,216 124,216" stroke="#9adbfb"/>
    <path d="M58,326 C92,326 96,296 124,296" stroke="#daff58"/>
    <path d="M388,256 H462" stroke="#ff5e44"/>
  </g>
  <!-- connections: two in, one out -->
  <g fill="none" stroke-linecap="round" stroke-width="34">
    <path d="M58,186 C92,186 96,216 124,216" stroke="#9adbfb"/>
    <path d="M58,326 C92,326 96,296 124,296" stroke="#daff58"/>
    <path d="M388,256 H462" stroke="#ff5e44"/>
  </g>

  <!-- node body -->
  <rect x="124" y="106" width="264" height="300" rx="42" fill="url(#node)" stroke="#6a6a6a" stroke-width="5"/>
  <g clip-path="url(#nodeclip)">
    <rect x="124" y="106" width="264" height="58" fill="url(#header)"/>
  </g>

  <!-- ports: 2 inputs (left), 1 output (right) -->
  <g stroke="#262626" stroke-width="6">
    <circle cx="124" cy="216" r="30" fill="#9adbfb"/>
    <circle cx="124" cy="296" r="30" fill="#daff58"/>
    <circle cx="388" cy="256" r="30" fill="#ff5e44"/>
  </g>
</svg>

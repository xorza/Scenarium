<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 138 392 236" width="392" height="236" role="img" aria-label="darkroom">
  <defs>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3e3e3e"/>
      <stop offset="1" stop-color="#2c2c2c"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7d66"/>
      <stop offset="1" stop-color="#ee5137"/>
    </linearGradient>
    <clipPath id="nodeclip">
      <rect x="158" y="150" width="196" height="212" rx="30"/>
    </clipPath>
  </defs>

  <!-- connection halos -->
  <g fill="none" stroke-linecap="round" stroke-width="30" opacity="0.16">
    <path d="M86,204 C118,204 126,228 158,228" stroke="#9adbfb"/>
    <path d="M86,308 C118,308 126,284 158,284" stroke="#daff58"/>
    <path d="M354,256 H426" stroke="#ff5e44"/>
  </g>
  <!-- connections: two in, one out -->
  <g fill="none" stroke-linecap="round" stroke-width="16">
    <path d="M86,204 C118,204 126,228 158,228" stroke="#9adbfb"/>
    <path d="M86,308 C118,308 126,284 158,284" stroke="#daff58"/>
    <path d="M354,256 H426" stroke="#ff5e44"/>
  </g>

  <!-- neighbour port stubs -->
  <g stroke="#1a1a1a" stroke-width="3">
    <circle cx="86" cy="204" r="11" fill="#9adbfb"/>
    <circle cx="86" cy="308" r="11" fill="#daff58"/>
    <circle cx="426" cy="256" r="11" fill="#ff5e44"/>
  </g>

  <!-- node body -->
  <rect x="158" y="150" width="196" height="212" rx="30" fill="url(#node)" stroke="#525252" stroke-width="2"/>
  <g clip-path="url(#nodeclip)">
    <rect x="158" y="150" width="196" height="42" fill="url(#header)"/>
    <circle cx="336" cy="171" r="5.5" fill="#fff" fill-opacity="0.85"/>
  </g>
  <g fill="#e2dfd3" fill-opacity="0.16">
    <rect x="184" y="214" width="104" height="11" rx="5.5"/>
    <rect x="184" y="256" width="72" height="11" rx="5.5"/>
    <rect x="184" y="312" width="92" height="11" rx="5.5"/>
  </g>

  <!-- ports: 2 inputs (left), 1 output (right) -->
  <g stroke="#2c2c2c" stroke-width="3">
    <circle cx="158" cy="228" r="16" fill="#9adbfb"/>
    <circle cx="158" cy="284" r="16" fill="#daff58"/>
    <circle cx="354" cy="256" r="16" fill="#ff5e44"/>
  </g>
</svg>

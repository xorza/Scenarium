<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 138 392 236" width="392" height="236" role="img" aria-label="darkroom">
  <!-- single-accent variant for small sizes / favicons. `currentColor`
       so the host can recolor it; defaults to the app cyan accent. -->
  <g color="#9adbfb">
    <!-- connections: two in, one out -->
    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="16">
      <path d="M86,204 C118,204 126,228 158,228"/>
      <path d="M86,308 C118,308 126,284 158,284"/>
      <path d="M354,256 H426"/>
    </g>
    <!-- node body outline -->
    <rect x="158" y="150" width="196" height="212" rx="30" fill="none" stroke="currentColor" stroke-width="14"/>
    <!-- ports: 2 inputs (left), 1 output (right) -->
    <g fill="currentColor">
      <circle cx="158" cy="228" r="20"/>
      <circle cx="158" cy="284" r="20"/>
      <circle cx="354" cy="256" r="20"/>
    </g>
  </g>
</svg>

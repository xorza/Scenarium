<svg xmlns="http://www.w3.org/2000/svg" viewBox="26 96 468 320" width="468" height="320" role="img" aria-label="darkroom">
  <!-- single-accent variant for small sizes / favicons. `currentColor`
       so the host can recolor it; defaults to the app cyan accent. -->
  <g color="#9adbfb">
    <!-- connections: two in, one out -->
    <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="24">
      <path d="M58,186 C92,186 96,216 124,216"/>
      <path d="M58,326 C92,326 96,296 124,296"/>
      <path d="M388,256 H462"/>
    </g>
    <!-- node body outline -->
    <rect x="124" y="106" width="264" height="300" rx="42" fill="none" stroke="currentColor" stroke-width="22"/>
    <!-- ports: 2 inputs (left), 1 output (right) -->
    <g fill="currentColor">
      <circle cx="124" cy="216" r="33"/>
      <circle cx="124" cy="296" r="33"/>
      <circle cx="388" cy="256" r="33"/>
    </g>
  </g>
</svg>

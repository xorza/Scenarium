# cargo-nextest configuration
# https://nexte.st/book/configuration.html

[profile.default]
# Run tests with moderate parallelism
test-threads = "num-cpus"

# Retry failed tests once
retries = 0

# Fail fast on first failure
fail-fast = true

# Status level - show pass/fail/skip
status-level = "pass"

# Final status level
final-status-level = "fail"

# Slow test threshold (warn after this duration)
slow-timeout = { period = "30s", terminate-after = 2 }

[profile.ci]
# CI profile with more conservative settings
test-threads = "num-cpus"
retries = 0
fail-fast = false
slow-timeout = { period = "30s", terminate-after = 2 }

# Real-data stacking tests process large RAW files and need more time
[[profile.default.overrides]]
filter = "package(lumos) & test(/stacking::tests::real_data/)"
slow-timeout = { period = "120s", terminate-after = 5 }

[[profile.ci.overrides]]
filter = "package(lumos) & test(/stacking::tests::real_data/)"
slow-timeout = { period = "120s", terminate-after = 5 }
